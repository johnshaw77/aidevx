<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>顏色心情日記 - Color Mood Diary</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap');
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        body {
            background: linear-gradient(135deg, #0a0e1f 0%, #1a1e2f 25%, #0f1a2e 50%, #162030 75%, #0a0e1f 100%);
            color: #c8cdd8;
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated gradient grid background */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                linear-gradient(rgba(255, 105, 180, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 105, 180, 0.05) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
            animation: grid-pulse 4s ease-in-out infinite alternate;
        }

        @keyframes grid-pulse {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 0.7; transform: scale(1.02); }
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .home-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #6b7280;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
        }

        .home-link:hover {
            color: #e8ecf2;
            transform: translateX(-3px);
        }

        .title {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ff69b4, #ff1493, #ff6b9d);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(255, 105, 180, 0.3);
        }

        .subtitle {
            font-size: 1.2rem;
            color: #9ca3af;
            margin-bottom: 40px;
        }

        .mood-input-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: #e8ecf2;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .mood-description {
            width: 100%;
            padding: 15px;
            border: 2px solid rgba(255, 105, 180, 0.2);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: #e8ecf2;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            min-height: 120px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .mood-description:focus {
            outline: none;
            border-color: rgba(255, 105, 180, 0.6);
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.2);
        }

        .mood-description::placeholder {
            color: #6b7280;
        }

        .color-picker-section {
            margin-bottom: 20px;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .color-option {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .color-option:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .color-option.selected {
            border-color: #fff;
            transform: scale(1.15);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .color-option::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            opacity: 0;
            transition: opacity 0.3s;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
        }

        .color-option.selected::after {
            opacity: 1;
        }

        .custom-color-section {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .custom-color-input {
            width: 80px;
            height: 50px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }

        .save-mood-btn {
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            border: none;
            color: white;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .save-mood-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 105, 180, 0.4);
        }

        .mood-history {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }

        .mood-entry {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 5px solid;
            position: relative;
            transition: all 0.3s ease;
        }

        .mood-entry:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(5px);
        }

        .mood-date {
            font-size: 14px;
            color: #9ca3af;
            margin-bottom: 10px;
        }

        .mood-text {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .mood-color-display {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            position: absolute;
            top: 20px;
            right: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .mood-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #ff69b4;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 14px;
            color: #9ca3af;
        }

        .clear-history-btn {
            background: rgba(255, 69, 69, 0.2);
            border: 1px solid rgba(255, 69, 69, 0.4);
            color: #ff6b6b;
            padding: 10px 20px;
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .clear-history-btn:hover {
            background: rgba(255, 69, 69, 0.3);
            border-color: rgba(255, 69, 69, 0.6);
        }

        .empty-state {
            text-align: center;
            color: #6b7280;
            font-style: italic;
            padding: 40px;
        }

        @media (max-width: 768px) {
            .color-grid {
                grid-template-columns: repeat(4, 1fr);
            }
            
            .title {
                font-size: 2.5rem;
            }
            
            .custom-color-section {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <a href="/" class="home-link">← 返回首頁</a>
    
    <div class="container">
        <div class="header">
            <h1 class="title">🎨 顏色心情日記</h1>
            <p class="subtitle">用顏色記錄你的心情軌跡</p>
        </div>

        <div class="mood-input-section">
            <h2 class="section-title">
                <span>✍️</span> 今天的心情如何？
            </h2>
            <textarea 
                class="mood-description" 
                placeholder="描述一下你今天的心情吧...&#10;例如：今天工作很順利，感覺特別有成就感，像陽光一樣溫暖明亮"
                id="moodText"
            ></textarea>
            
            <div class="color-picker-section">
                <h3 class="section-title">
                    <span>🎨</span> 選擇代表心情的顏色
                </h3>
                <div class="color-grid" id="colorGrid">
                    <div class="color-option" style="background: linear-gradient(135deg, #ff6b6b, #ee5a6f);" data-color="#ff6b6b"></div>
                    <div class="color-option" style="background: linear-gradient(135deg, #4ecdc4, #44a08d);" data-color="#4ecdc4"></div>
                    <div class="color-option" style="background: linear-gradient(135deg, #45b7d1, #96c93d);" data-color="#45b7d1"></div>
                    <div class="color-option" style="background: linear-gradient(135deg, #f9ca24, #f0932b);" data-color="#f9ca24"></div>
                    <div class="color-option" style="background: linear-gradient(135deg, #6c5ce7, #a29bfe);" data-color="#6c5ce7"></div>
                    <div class="color-option" style="background: linear-gradient(135deg, #fd79a8, #e84393);" data-color="#fd79a8"></div>
                    <div class="color-option" style="background: linear-gradient(135deg, #00b894, #00cec9);" data-color="#00b894"></div>
                    <div class="color-option" style="background: linear-gradient(135deg, #e17055, #d63031);" data-color="#e17055"></div>
                    <div class="color-option" style="background: linear-gradient(135deg, #0984e3, #74b9ff);" data-color="#0984e3"></div>
                    <div class="color-option" style="background: linear-gradient(135deg, #6c5ce7, #fd79a8);" data-color="#6c5ce7"></div>
                    <div class="color-option" style="background: linear-gradient(135deg, #fdcb6e, #e17055);" data-color="#fdcb6e"></div>
                    <div class="color-option" style="background: linear-gradient(135deg, #636e72, #2d3436);" data-color="#636e72"></div>
                    <div class="color-option" style="background: linear-gradient(135deg, #ff7675, #fab1a0);" data-color="#ff7675"></div>
                    <div class="color-option" style="background: linear-gradient(135deg, #55a3ff, #003d82);" data-color="#55a3ff"></div>
                    <div class="color-option" style="background: linear-gradient(135deg, #81ecec, #00cec9);" data-color="#81ecec"></div>
                    <div class="color-option" style="background: linear-gradient(135deg, #a29bfe, #6c5ce7);" data-color="#a29bfe"></div>
                </div>
                
                <div class="custom-color-section">
                    <input type="color" class="custom-color-input" id="customColor" value="#ff69b4">
                    <span>或選擇自定義顏色</span>
                </div>
            </div>
            
            <button class="save-mood-btn" onclick="saveMood()">
                💾 保存今天的心情
            </button>
        </div>

        <div class="mood-history">
            <h2 class="section-title">
                <span>📖</span> 心情記錄
            </h2>
            <div id="moodHistoryContainer">
                <div class="empty-state">
                    還沒有記錄，快來記錄第一個心情吧！
                </div>
            </div>
            
            <div class="mood-stats" id="moodStats" style="display: none;">
                <div class="stat-card">
                    <div class="stat-value" id="totalEntries">0</div>
                    <div class="stat-label">總記錄數</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="daysTracked">0</div>
                    <div class="stat-label">記錄天數</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="favoriteColor">-</div>
                    <div class="stat-label">最愛顏色</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="currentStreak">0</div>
                    <div class="stat-label">連續記錄</div>
                </div>
            </div>
            
            <button class="clear-history-btn" onclick="clearHistory()" id="clearBtn" style="display: none;">
                🗑️ 清除所有記錄
            </button>
        </div>
    </div>

    <script>
        let selectedColor = '#ff69b4';
        let moodEntries = JSON.parse(localStorage.getItem('moodEntries')) || [];

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadMoodHistory();
            updateStats();
            
            // 綁定顏色選擇事件
            document.querySelectorAll('.color-option').forEach(option => {
                option.addEventListener('click', function() {
                    document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
                    this.classList.add('selected');
                    selectedColor = this.dataset.color;
                });
            });
            
            // 自定義顏色選擇
            document.getElementById('customColor').addEventListener('change', function() {
                selectedColor = this.value;
                document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
            });
        });

        function saveMood() {
            const moodText = document.getElementById('moodText').value.trim();
            
            if (!moodText) {
                alert('請描述一下你的心情！');
                return;
            }

            const moodEntry = {
                id: Date.now(),
                date: new Date().toISOString(),
                text: moodText,
                color: selectedColor,
                timestamp: Date.now()
            };

            moodEntries.unshift(moodEntry);
            localStorage.setItem('moodEntries', JSON.stringify(moodEntries));
            
            // 清空輸入
            document.getElementById('moodText').value = '';
            document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
            selectedColor = '#ff69b4';
            
            // 重新載入歷史記錄
            loadMoodHistory();
            updateStats();
            
            // 成功提示
            showToast('心情記錄已保存！ 🎉');
        }

        function loadMoodHistory() {
            const container = document.getElementById('moodHistoryContainer');
            
            if (moodEntries.length === 0) {
                container.innerHTML = '<div class="empty-state">還沒有記錄，快來記錄第一個心情吧！</div>';
                document.getElementById('clearBtn').style.display = 'none';
                return;
            }
            
            document.getElementById('clearBtn').style.display = 'block';
            
            container.innerHTML = moodEntries.map(entry => {
                const date = new Date(entry.date);
                const dateStr = date.toLocaleDateString('zh-TW', { 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric',
                    weekday: 'long'
                });
                const timeStr = date.toLocaleTimeString('zh-TW', {
                    hour: '2-digit',
                    minute: '2-digit'
                });
                
                return `
                    <div class="mood-entry" style="border-left-color: ${entry.color}">
                        <div class="mood-color-display" style="background-color: ${entry.color}"></div>
                        <div class="mood-date">${dateStr} ${timeStr}</div>
                        <div class="mood-text">${entry.text}</div>
                    </div>
                `;
            }).join('');
        }

        function updateStats() {
            if (moodEntries.length === 0) {
                document.getElementById('moodStats').style.display = 'none';
                return;
            }
            
            document.getElementById('moodStats').style.display = 'grid';
            
            // 總記錄數
            document.getElementById('totalEntries').textContent = moodEntries.length;
            
            // 記錄天數 (去重日期)
            const uniqueDays = new Set(moodEntries.map(entry => 
                new Date(entry.date).toDateString()
            ));
            document.getElementById('daysTracked').textContent = uniqueDays.size;
            
            // 最愛顏色
            const colorCounts = {};
            moodEntries.forEach(entry => {
                colorCounts[entry.color] = (colorCounts[entry.color] || 0) + 1;
            });
            const favoriteColor = Object.keys(colorCounts).reduce((a, b) => 
                colorCounts[a] > colorCounts[b] ? a : b
            );
            document.getElementById('favoriteColor').innerHTML = 
                `<span style="display:inline-block;width:20px;height:20px;background:${favoriteColor};border-radius:50%;"></span>`;
            
            // 連續記錄天數
            let streak = 0;
            const today = new Date().toDateString();
            const sortedEntries = [...moodEntries].sort((a, b) => new Date(b.date) - new Date(a.date));
            
            for (let i = 0; i < sortedEntries.length; i++) {
                const entryDate = new Date(sortedEntries[i].date).toDateString();
                const expectedDate = new Date();
                expectedDate.setDate(expectedDate.getDate() - i);
                
                if (entryDate === expectedDate.toDateString()) {
                    streak++;
                } else {
                    break;
                }
            }
            
            document.getElementById('currentStreak').textContent = streak;
        }

        function clearHistory() {
            if (confirm('確定要清除所有心情記錄嗎？此操作無法復原！')) {
                moodEntries = [];
                localStorage.removeItem('moodEntries');
                loadMoodHistory();
                updateStats();
                showToast('所有記錄已清除');
            }
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: linear-gradient(135deg, #ff69b4, #ff1493);
                color: white;
                padding: 15px 25px;
                border-radius: 12px;
                font-weight: 600;
                z-index: 1000;
                box-shadow: 0 10px 25px rgba(255, 105, 180, 0.4);
                transform: translateY(-100px);
                transition: all 0.3s ease;
            `;
            toast.textContent = message;
            
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.transform = 'translateY(0)';
            }, 100);
            
            setTimeout(() => {
                toast.style.transform = 'translateY(-100px)';
                setTimeout(() => {
                    document.body.removeChild(toast);
                }, 300);
            }, 3000);
        }

        // 鍵盤快捷鍵
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                saveMood();
            }
        });
    </script>
</body>
</html>
