<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 智慧工廠視覺化 | 台郡 FPC 生產線</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            overflow: hidden;
            color: white;
        }
        
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        
        #info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 100;
            max-width: 300px;
        }
        
        .metric {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
        }
        
        .metric-value {
            color: #4CAF50;
            font-weight: bold;
        }
        
        .metric-warning {
            color: #FF9800;
        }
        
        .metric-danger {
            color: #F44336;
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            gap: 15px;
            z-index: 100;
        }
        
        .control-btn {
            padding: 12px 20px;
            background: rgba(76, 175, 80, 0.9);
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .control-btn:hover {
            background: rgba(76, 175, 80, 1);
            transform: scale(1.05);
        }
        
        .control-btn:active {
            transform: scale(0.95);
        }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 1000;
            font-size: 18px;
        }
        
        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #4CAF50;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .fade-out {
            opacity: 0;
            transition: opacity 1s ease;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="loading">
            <div class="loading-spinner"></div>
            <h2>🏭 智慧工廠載入中...</h2>
            <p>正在初始化 FPC 生產線系統</p>
        </div>
        
        <div id="info-panel" style="display: none;">
            <h3>🏭 台郡智慧工廠</h3>
            <div class="metric">
                <span>📊 產線效率</span>
                <span class="metric-value" id="efficiency">87.5%</span>
            </div>
            <div class="metric">
                <span>⚡ 設備狀態</span>
                <span class="metric-value" id="equipment">運行中</span>
            </div>
            <div class="metric">
                <span>📦 今日產量</span>
                <span class="metric-value" id="production">2,847 片</span>
            </div>
            <div class="metric">
                <span>🌡️ 環境溫度</span>
                <span class="metric-value" id="temperature">24°C</span>
            </div>
            <div class="metric">
                <span>🔧 維護狀態</span>
                <span class="metric-value" id="maintenance">正常</span>
            </div>
        </div>
        
        <div id="controls" style="display: none;">
            <button class="control-btn" onclick="toggleProduction()">
                🔄 切換生產模式
            </button>
            <button class="control-btn" onclick="resetCamera()">
                📷 重置視角
            </button>
            <button class="control-btn" onclick="toggleAnimation()">
                ⏯️ 暫停/播放
            </button>
        </div>
    </div>

    <script>
        // 全局變數
        let scene, camera, renderer, controls;
        let productionLine = [];
        let robots = [];
        let agvs = [];
        let animationRunning = true;
        let productionMode = 'auto';
        
        // 初始化場景
        function init() {
            // 建立場景
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x1a1a1a, 10, 100);
            
            // 建立相機
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(15, 10, 15);
            
            // 建立渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x0a0a0a);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('container').appendChild(renderer.domElement);
            
            // 軌道控制器
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.enableZoom = true;
            controls.autoRotate = false;
            
            // 建立光源
            createLighting();
            
            // 建立工廠場景
            createFactory();
            
            // 隱藏載入畫面，顯示介面
            setTimeout(() => {
                document.getElementById('loading').classList.add('fade-out');
                setTimeout(() => {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('info-panel').style.display = 'block';
                    document.getElementById('controls').style.display = 'flex';
                }, 1000);
            }, 2000);
            
            // 啟動動畫
            animate();
            
            // 更新數據
            updateMetrics();
            setInterval(updateMetrics, 3000);
        }
        
        // 建立光源
        function createLighting() {
            // 環境光
            const ambientLight = new THREE.AmbientLight(0x404040, 0.3);
            scene.add(ambientLight);
            
            // 主光源
            const mainLight = new THREE.DirectionalLight(0xffffff, 1);
            mainLight.position.set(20, 20, 10);
            mainLight.castShadow = true;
            mainLight.shadow.mapSize.width = 2048;
            mainLight.shadow.mapSize.height = 2048;
            scene.add(mainLight);
            
            // 工廠內部照明
            for(let i = 0; i < 4; i++) {
                const light = new THREE.PointLight(0x88ccff, 0.5, 15);
                light.position.set((i-1.5)*8, 8, 0);
                scene.add(light);
            }
        }
        
        // 建立工廠場景
        function createFactory() {
            // 地板
            const floorGeometry = new THREE.PlaneGeometry(50, 30);
            const floorMaterial = new THREE.MeshLambertMaterial({ 
                color: 0x333333,
                transparent: true,
                opacity: 0.8
            });
            const floor = new THREE.Mesh(floorGeometry, floorMaterial);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);
            
            // 建立 FPC 生產線
            createProductionLine();
            
            // 建立機械手臂
            createRobots();
            
            // 建立 AGV 小車
            createAGVs();
            
            // 建立工廠結構
            createFactoryStructure();
        }
        
        // 建立 FPC 生產線
        function createProductionLine() {
            for(let i = 0; i < 6; i++) {
                const stationGroup = new THREE.Group();
                
                // 工作站底座
                const baseGeometry = new THREE.BoxGeometry(3, 1, 2);
                const baseMaterial = new THREE.MeshLambertMaterial({ color: 0x555555 });
                const base = new THREE.Mesh(baseGeometry, baseMaterial);
                base.position.y = 0.5;
                base.castShadow = true;
                stationGroup.add(base);
                
                // 工作台
                const tableGeometry = new THREE.BoxGeometry(2.8, 0.1, 1.8);
                const tableMaterial = new THREE.MeshLambertMaterial({ color: 0x888888 });
                const table = new THREE.Mesh(tableGeometry, tableMaterial);
                table.position.y = 1.05;
                stationGroup.add(table);
                
                // FPC 軟板樣品
                const fpcGeometry = new THREE.BoxGeometry(0.3, 0.02, 0.2);
                const fpcMaterial = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
                const fpc = new THREE.Mesh(fpcGeometry, fpcMaterial);
                fpc.position.set(
                    (Math.random() - 0.5) * 1.5,
                    1.12,
                    (Math.random() - 0.5) * 1.0
                );
                stationGroup.add(fpc);
                
                // 狀態指示燈
                const lightGeometry = new THREE.SphereGeometry(0.1);
                const lightMaterial = new THREE.MeshBasicMaterial({ 
                    color: Math.random() > 0.3 ? 0x00ff00 : 0xff3333,
                    transparent: true,
                    opacity: 0.8
                });
                const statusLight = new THREE.Mesh(lightGeometry, lightMaterial);
                statusLight.position.set(1.2, 1.8, 0.8);
                stationGroup.add(statusLight);
                
                stationGroup.position.set((i-2.5)*5, 0, -5);
                scene.add(stationGroup);
                productionLine.push({
                    group: stationGroup,
                    fpc: fpc,
                    light: statusLight,
                    status: Math.random() > 0.3 ? 'running' : 'idle'
                });
            }
        }
        
        // 建立機械手臂
        function createRobots() {
            for(let i = 0; i < 3; i++) {
                const robotGroup = new THREE.Group();
                
                // 底座
                const baseGeometry = new THREE.CylinderGeometry(0.8, 1, 1.5);
                const baseMaterial = new THREE.MeshLambertMaterial({ color: 0x4169E1 });
                const base = new THREE.Mesh(baseGeometry, baseMaterial);
                base.position.y = 0.75;
                robotGroup.add(base);
                
                // 手臂
                const armGeometry = new THREE.BoxGeometry(0.3, 3, 0.3);
                const armMaterial = new THREE.MeshLambertMaterial({ color: 0x6495ED });
                const arm = new THREE.Mesh(armGeometry, armMaterial);
                arm.position.y = 3;
                robotGroup.add(arm);
                
                // 工具頭
                const toolGeometry = new THREE.SphereGeometry(0.2);
                const toolMaterial = new THREE.MeshLambertMaterial({ color: 0xFF6347 });
                const tool = new THREE.Mesh(toolGeometry, toolMaterial);
                tool.position.set(0, 4.2, 0);
                robotGroup.add(tool);
                
                robotGroup.position.set((i-1)*8, 0, 0);
                scene.add(robotGroup);
                robots.push({
                    group: robotGroup,
                    arm: arm,
                    tool: tool,
                    rotation: 0
                });
            }
        }
        
        // 建立 AGV 小車
        function createAGVs() {
            for(let i = 0; i < 2; i++) {
                const agvGroup = new THREE.Group();
                
                // 車體
                const bodyGeometry = new THREE.BoxGeometry(1.5, 0.3, 1);
                const bodyMaterial = new THREE.MeshLambertMaterial({ color: 0xFFD700 });
                const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
                body.position.y = 0.4;
                body.castShadow = true;
                agvGroup.add(body);
                
                // 車輪
                for(let j = 0; j < 4; j++) {
                    const wheelGeometry = new THREE.CylinderGeometry(0.2, 0.2, 0.1);
                    const wheelMaterial = new THREE.MeshLambertMaterial({ color: 0x333333 });
                    const wheel = new THREE.Mesh(wheelGeometry, wheelMaterial);
                    wheel.rotation.z = Math.PI / 2;
                    wheel.position.set(
                        j < 2 ? -0.6 : 0.6,
                        0.2,
                        j % 2 === 0 ? -0.3 : 0.3
                    );
                    agvGroup.add(wheel);
                }
                
                agvGroup.position.set(i * 10 - 5, 0, 8);
                scene.add(agvGroup);
                agvs.push({
                    group: agvGroup,
                    path: 0,
                    direction: 1
                });
            }
        }
        
        // 建立工廠結構
        function createFactoryStructure() {
            // 支柱
            for(let i = 0; i < 8; i++) {
                const pillarGeometry = new THREE.BoxGeometry(0.5, 12, 0.5);
                const pillarMaterial = new THREE.MeshLambertMaterial({ color: 0x666666 });
                const pillar = new THREE.Mesh(pillarGeometry, pillarMaterial);
                pillar.position.set(
                    (i % 4 - 1.5) * 12,
                    6,
                    Math.floor(i / 4) * 20 - 10
                );
                pillar.castShadow = true;
                scene.add(pillar);
            }
        }
        
        // 動畫循環
        function animate() {
            requestAnimationFrame(animate);
            
            if(animationRunning) {
                // 機械手臂動畫
                robots.forEach((robot, index) => {
                    robot.rotation += 0.01;
                    robot.arm.rotation.y = Math.sin(robot.rotation) * 0.5;
                    robot.tool.position.y = 4.2 + Math.sin(robot.rotation * 2) * 0.3;
                });
                
                // AGV 移動動畫
                agvs.forEach((agv, index) => {
                    agv.path += 0.02 * agv.direction;
                    if(agv.path > Math.PI || agv.path < 0) {
                        agv.direction *= -1;
                    }
                    agv.group.position.x = Math.sin(agv.path) * 15;
                });
                
                // FPC 處理動畫
                productionLine.forEach((station, index) => {
                    if(station.status === 'running') {
                        station.fpc.rotation.z += 0.01;
                        station.light.material.color.setHex(0x00ff00);
                    } else {
                        station.light.material.color.setHex(0xff3333);
                    }
                });
            }
            
            controls.update();
            renderer.render(scene, camera);
        }
        
        // 更新數據指標
        function updateMetrics() {
            const efficiency = 75 + Math.random() * 25;
            const production = Math.floor(2500 + Math.random() * 1000);
            const temperature = 22 + Math.random() * 6;
            
            document.getElementById('efficiency').textContent = efficiency.toFixed(1) + '%';
            document.getElementById('production').textContent = production.toLocaleString() + ' 片';
            document.getElementById('temperature').textContent = temperature.toFixed(1) + '°C';
            
            // 更新指標顏色
            const efficiencyEl = document.getElementById('efficiency');
            if(efficiency > 90) {
                efficiencyEl.className = 'metric-value';
            } else if(efficiency > 75) {
                efficiencyEl.className = 'metric-warning';
            } else {
                efficiencyEl.className = 'metric-danger';
            }
        }
        
        // 控制函數
        function toggleProduction() {
            productionMode = productionMode === 'auto' ? 'manual' : 'auto';
            productionLine.forEach(station => {
                station.status = productionMode === 'auto' ? 
                    (Math.random() > 0.3 ? 'running' : 'idle') : 'manual';
            });
        }
        
        function resetCamera() {
            camera.position.set(15, 10, 15);
            controls.target.set(0, 0, 0);
        }
        
        function toggleAnimation() {
            animationRunning = !animationRunning;
        }
        
        // 響應式設計
        window.addEventListener('resize', function() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // 啟動場景
        init();
    </script>
</body>
</html>
